<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit IPO - Bluestock</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f9;
      color: #333;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 180px;
      background: #fff;
      padding: 20px 10px;
      border-right: 1px solid #ddd;
      height: 100vh;
      z-index: 10;
    }
    .sidebar h2 {
      font-size: 17px;
      margin-bottom: 28px;
      color: #223;
      text-align: center;
    }
    .menu a {
      display: block;
      padding: 10px 0;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      text-align: left;
      transition: color 0.2s;
    }
    .menu a.active, .menu a:hover {
      color: #444;
      font-weight: 600;
    }
    .main {
      margin-left: 180px;
      padding: 30px;
      min-height: 100vh;
      background: #f5f5f9;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .page-header {
      font-size: 24px;
      font-weight: 600;
      color: #333;
    }
    .back-btn {
      padding: 8px 16px;
      background: #6c757d;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-container {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 800px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #5d78ff;
      box-shadow: 0 0 0 2px rgba(93, 120, 255, 0.1);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-primary {
      background: #5d78ff;
      color: #fff;
    }
    .btn-secondary {
      background: #6c757d;
      color: #fff;
    }
    .btn-danger {
      background: #dc3545;
      color: #fff;
    }
    .messages {
      margin-bottom: 20px;
    }
    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    @media (max-width: 768px) {
      .main {
        margin-left: 0;
        padding: 20px;
      }
      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #ddd;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="sidebar">
  <h2>Bluestock Fintech</h2>
  <div class="menu">
    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a href="{% url 'manage_ipo' %}" class="active">Manage IPO</a>
    <a href="{% url 'ipo_subscription' %}">IPO Subscription</a>
    <a href="{% url 'ipo_allotment' %}">IPO Allotment</a>
    <br>
    <a href="{% url 'settings' %}">Settings</a>
    <a href="{% url 'api_manager' %}">API Manager</a>
    <a href="{% url 'accounts' %}">Accounts</a>
    <a href="{% url 'help' %}">Help</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1 class="page-header">Edit IPO - {{ ipo.company.name }}</h1>
    <a href="{% url 'manage_ipo' %}" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Manage IPO
    </a>
  </div>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message {{ message.tags }}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="form-container">
    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="company_name">Company Name</label>
        <input type="text" id="company_name" name="company_name" value="{{ ipo.company.name }}" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price_band_lower">Price Band Lower (₹)</label>
          <input type="number" id="price_band_lower" name="price_band_lower" value="{{ ipo.price_band_lower }}" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="price_band_upper">Price Band Upper (₹)</label>
          <input type="number" id="price_band_upper" name="price_band_upper" value="{{ ipo.price_band_upper }}" step="0.01" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="open_date">Open Date</label>
          <input type="date" id="open_date" name="open_date" value="{{ ipo.open_date|date:'Y-m-d' }}" required>
        </div>
        <div class="form-group">
          <label for="close_date">Close Date</label>
          <input type="date" id="close_date" name="close_date" value="{{ ipo.close_date|date:'Y-m-d' }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="issue_size">Issue Size (Crores)</label>
          <input type="number" id="issue_size" name="issue_size" value="{{ ipo.issue_size }}" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="issue_type">Issue Type</label>
          <select id="issue_type" name="issue_type" required>
            {% for value, label in issue_type_choices %}
            <option value="{{ value }}" {% if ipo.issue_type == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="listing_date">Listing Date</label>
          <input type="date" id="listing_date" name="listing_date" value="{% if ipo.listing_date %}{{ ipo.listing_date|date:'Y-m-d' }}{% endif %}">
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status" required>
            {% for value, label in status_choices %}
            <option value="{{ value }}" {% if ipo.status == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Update IPO
        </button>
        <a href="{% url 'manage_ipo' %}" class="btn btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
        <a href="{% url 'delete_ipo' ipo.id %}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this IPO? This action cannot be undone.')">
          <i class="fas fa-trash"></i> Delete IPO
        </a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
